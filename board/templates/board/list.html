<h1>문의 목록</h1>

<a href="/create/">문의 등록</a>

<table border="1">
    <tr>
        <th>제목</th>
        <th>유형</th>
        <th>상태</th>
        <th>담당자</th>
        <th>작성일</th>
    </tr>

    {% for i in inquiries %}
    <tr>
        <td><a href="/{{ i.id }}/">{{ i.title }}</a></td>
        <td>{{ i.type }}</td>
        <td>{{ i.status }}</td>
        <td>{{ i.manager }}</td>
        <td>{{ i.created_at }}</td>
    </tr>
    {% endfor %}
</table>
